# FastAPI Documentation RAG Production Configuration

ingestion:
  docs_dir: "./docs"
  docs_src_dir: "./docs_src"
  chunk_size: 1000
  chunk_overlap: 200
  quality_filters:
    min_word_count: 10
    max_word_count: 2000

output:
  base_dir: "./output"
  ingestion_dir: "ingestion"
  embedding_dir: "embedding"

storage:
  type: "gcs"
  gcs:
    bucket_name: "fastapi-docs-rag"
    chunks_file: "ingestion/processed_chunks.jsonl"
    filtered_chunks_file: "ingestion/filtered_chunks.jsonl"
    metadata_file: "ingestion/metadata_lookup.json"

gcp:
  project_id: ${GCP_PROJECT_ID}
  location: ${GCP_LOCATION}

vector_search:
  # Get this from your Vertex AI Vector Search index in GCP Console
  # Format: projects/PROJECT_ID/locations/LOCATION/indexEndpoints/ENDPOINT_ID
  endpoint: "projects/fastapidocsrag/locations/us-central1/indexEndpoints/8943209877027684352"
  deployed_index_id: "fastapidocs_index_1773885930751"  # The actual deployed index ID
  dimensions: 768
  top_k: 5

gemini:
  model: "gemini-3.1-flash-lite-preview"
  max_tokens: 4096
  temperature: 0.1

embeddings:
  type: "vertex"
  model: "textembedding-gecko@003"

mkdocs:
  config_file: "./mkdocs.yml"

logging:
  enabled: true
  log_dir: "./output/logs"
  log_level: "WARNING"
  log_retention_days: 7
  include_request_metadata: false
  include_performance_metrics: true
